name: MyEngine CI

permissions:
  contents: read

env:
  MYENGINE_GIT_COMMIT: ${{ github.sha }}

on:
  push:
    branches: [main, master, "codex/**"]
  pull_request:
  workflow_dispatch:
    inputs:
      soak_seconds:
        description: GPU release-smoke soak duration
        required: false
        default: "60"
        type: number
      run_real_device_loss_lab:
        description: Wait for a supervised real driver/device removal after smoke
        required: false
        default: false
        type: boolean
      real_device_loss_backend:
        description: Backend used by the supervised real device-loss lab
        required: false
        default: d3d12
        type: choice
        options:
          - d3d12
          - d3d11
      real_device_loss_timeout:
        description: Supervised fault window in seconds
        required: false
        default: "120"
        type: number

concurrency:
  group: myengine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          persist-credentials: false
          clean: true
      - name: Install pinned clang-format
        shell: powershell
        run: python -m pip install --disable-pip-version-check clang-format==19.1.5
      - name: Check C and C++ formatting
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tools\clang-format.ps1

  debug-smoke:
    runs-on: windows-2022
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        vulkan: [false, true]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
          clean: true
      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          xmake-version: "3.0.8"
      - name: Cache xmake packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: windows-xmake-3.0.8-vulkan-${{ matrix.vulkan }}-${{ hashFiles('**/xmake.lua', 'xmake/**/*.lua', 'packages/**/xmake.lua') }}
      - name: Run debug smoke gate
        shell: powershell
        env:
          ENABLE_VULKAN: ${{ matrix.vulkan }}
        run: |
          $arguments = @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "tools\smoke.ps1")
          if ($env:ENABLE_VULKAN -eq "true") { $arguments += "-Vulkan" }
          powershell @arguments

  minimum-xmake:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
          clean: true
      - name: Set up minimum supported xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          xmake-version: "2.8.0"
      - name: Cache xmake packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: windows-xmake-2.8.0-vulkan-false-${{ hashFiles('**/xmake.lua', 'xmake/**/*.lua', 'packages/**/xmake.lua') }}
      - name: Configure and validate architecture
        run: |
          xmake f -y -m debug --vulkan=n
          xmake build MyEngine.Architecture
      - name: Build without running tests
        run: xmake build MyEngineTests

  macos-metal:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
          clean: true
      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          xmake-version: "3.0.8"
      - name: Cache xmake packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: macos-xmake-3.0.8-metal-${{ hashFiles('**/xmake.lua', 'xmake/**/*.lua', 'packages/**/xmake.lua') }}
      - name: Configure Metal build
        run: xmake f -y -m debug --vulkan=n
      - name: Build Runtime, Editor, and tests
        run: |
          xmake build MyEngineRuntime
          xmake build MyEngineEditor
          xmake build MyEngineTests
          xmake build MyEngineRuntimeLinkProbe
      - name: Run headless-compatible tests
        run: |
          xmake run MyEngineTests
          xmake run MyEngineRuntimeLinkProbe

  release-build:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
          clean: true
      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a # v1
        with:
          xmake-version: "3.0.8"
      - name: Cache xmake packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: windows-xmake-3.0.8-vulkan-false-${{ hashFiles('**/xmake.lua', 'xmake/**/*.lua', 'packages/**/xmake.lua') }}
          restore-keys: |
            windows-xmake-3.0.8-vulkan-false-
      - name: Configure release
        run: xmake f -y -m release --vulkan=n
      - name: Build release deliverables
        shell: powershell
        run: |
          xmake build MyEngineIconTool
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          xmake build MyEngineEditor
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          xmake build MyEnginePlayer
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          xmake build MyEngineCooker
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          xmake build MyEngineTests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          xmake build MyEngineRuntimeLinkProbe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          xmake run MyEngineRuntimeLinkProbe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Archive release symbols and provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: myengine-symbols-${{ github.sha }}-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            build/windows/x64/release/*.pdb
            build/windows/x64/release/*.map

  gpu-release-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.repository == 'bladesero/MyEngine' &&
      github.ref == 'refs/heads/master'
    environment: myengine-gpu-production
    runs-on: [self-hosted, Windows, X64, myengine-gpu]
    timeout-minutes: 120
    concurrency:
      group: myengine-gpu-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 1
          persist-credentials: false
          clean: true
      - name: Run signed-package-compatible dual-backend release gate
        shell: powershell
        env:
          SOAK_SECONDS: ${{ inputs.soak_seconds }}
        run: |
          $soakSeconds = 0
          if (-not [int]::TryParse($env:SOAK_SECONDS, [ref]$soakSeconds) -or
              $soakSeconds -lt 1 -or $soakSeconds -gt 3600) {
              throw "soak_seconds must be an integer between 1 and 3600"
          }
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File tools\release-smoke.ps1 `
            -SoakSeconds $soakSeconds `
            -ReloadIterations 10
      - name: Publish package for supervised real device-loss lab
        if: inputs.run_real_device_loss_lab
        shell: powershell
        run: >-
          powershell -NoProfile -ExecutionPolicy Bypass
          -File tools\publish.ps1 -Project . -Mode release
      - name: Wait for supervised real driver or device removal
        if: inputs.run_real_device_loss_lab
        shell: powershell
        env:
          LAB_BACKEND: ${{ inputs.real_device_loss_backend }}
          LAB_TIMEOUT: ${{ inputs.real_device_loss_timeout }}
        run: |
          $labTimeout = 0
          if (-not [int]::TryParse($env:LAB_TIMEOUT, [ref]$labTimeout) -or
              $labTimeout -lt 15 -or $labTimeout -gt 900) {
              throw "real_device_loss_timeout must be an integer between 15 and 900"
          }
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File tools\gpu-device-loss-lab.ps1 `
            -Package Builds\MyEngine-windows-x64 `
            -Backend $env:LAB_BACKEND `
            -TimeoutSeconds $labTimeout `
            -EvidenceDirectory Builds\MyEngine-windows-x64\lab-evidence\workflow
      - name: Archive real device-loss lab evidence
        if: always() && inputs.run_real_device_loss_lab
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: myengine-real-device-loss-${{ inputs.real_device_loss_backend }}-${{ github.sha }}-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 90
          path: Builds/MyEngine-windows-x64/lab-evidence/workflow/**
